background {
    monitor =
  #path = $HOME/Pictures/CURRENT
    path = screenshot
    blur_passes = 1
    blur_size = 7
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}
shape {
    monitor =
    size = 600, 800
    color = rgba(40, 40, 40, 1)
    rounding = 90
    rotate = 0
    xray = false

    position = -500, 0
    halign = center
    valign = center
    border_color = rgb(689d6a)
    border_size = 1
 }
shape {
    monitor =
    size = 400, 600
    color = rgba(40, 40, 40, 1)

    border_color = rgb(b16286)
    border_size = 1

    rounding = 90
    rotate = 0
    xray = false

    position = 500, 0
    halign = center
    valign = center
}
input-field {
    monitor =
    size = 200, 50
    outline_thickness = 1
    dots_size = 0.2 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.2 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    dots_rounding = -1 # -1 default circle, -2 follow input-field rounding
    outer_color = rgb(b16286)
    inner_color = rgba(393939ff)
    font_color = rgb(ebdbb2)
    fade_on_empty = false
    placeholder_text = 
    hide_input = false
    rounding = -1 # -1 means complete rounding (circle/oval)
    check_color = rgba(d7992166)
    fail_color = rgba(fb493466) # if authentication failed, changes outer_color and fail message color
    fail_text =   # can be set to empty
    fail_transition = 300 # transition time in ms between normal outer_color and fail_color
    capslock_color = rgba(f38ba866)
    numlock_color = -1
    bothlock_color = -1 # when both locks are active. -1 means don't change outer color (same for above)
    invert_numlock = false # change color if numlock is off
    swap_font_color = false # see below
    position = 500, -180
    halign = center
    valign = center
    font_family = JetbrainsMono Nerd Font
}

